<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=index.php">
    <title>Redirecting…</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        :root {
            color-scheme: light dark;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 40px 24px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at top, #5a67d8 0%, #2c2e4f 65%, #161629 100%);
            color: #f7fafc;
        }
        .card {
            width: min(620px, 100%);
            padding: 48px;
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.85);
            box-shadow: 0 30px 80px rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(24px);
            text-align: center;
        }
        h1 {
            font-size: clamp(2rem, 5vw, 2.8rem);
            margin-bottom: 16px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        p {
            margin: 0;
            opacity: 0.78;
            font-size: 1rem;
            line-height: 1.6;
        }
        .cta {
            margin-top: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 28px;
            border-radius: 999px;
            background: linear-gradient(135deg, #7f9cf5, #5a67d8);
            color: white;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.02em;
            box-shadow: 0 12px 40px rgba(94, 129, 244, 0.45);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .cta:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 50px rgba(94, 129, 244, 0.6);
        }
        small {
            display: block;
            margin-top: 24px;
            opacity: 0.55;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Redirecting to the unified dashboard…</h1>
        <p>
            We consolidated <code>index.html</code> and <code>index.php</code> into a single real-time control surface.
            If you are not automatically redirected, tap the button below.
        </p>
        <a class="cta" href="index.php">Launch the Command Center →</a>
        <small>Tip: update bookmarks to point at <strong>index.php</strong> for the latest experience.</small>
    </div>
</body>
</html>

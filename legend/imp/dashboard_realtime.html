<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Real-Time Proxy Dashboard | LEGEND_BL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4338ca;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: rgba(15, 23, 42, 0.1);
            --backdrop: rgba(255, 255, 255, 0.95);
            
            /* Dark mode */
            --dark-bg-primary: #0f172a;
            --dark-bg-secondary: #1e293b;
            --dark-bg-tertiary: #334155;
            --dark-text-primary: #f1f5f9;
            --dark-text-secondary: #cbd5e1;
            --dark-border: #334155;
            --dark-backdrop: rgba(15, 23, 42, 0.95);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        
        body.dark-mode::before {
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--backdrop);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 1;
            animation: slideDown 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .dark-mode .container {
            background: var(--dark-backdrop);
            border-color: var(--dark-border);
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Dark Mode Toggle */
        .theme-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 1000;
            background: var(--backdrop);
            backdrop-filter: blur(20px);
            border: 2px solid var(--border);
            border-radius: 50px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(15, 23, 42, 0.2);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .dark-mode .theme-toggle {
            background: var(--dark-backdrop);
            border-color: var(--dark-border);
        }
        
        .theme-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.3);
        }
        
        .theme-toggle-option {
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }
        
        .dark-mode .theme-toggle-option {
            color: var(--dark-text-secondary);
        }
        
        .theme-toggle-option.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        h1 {
            color: var(--text-primary);
            margin-bottom: 15px;
            font-size: 36px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px;
            background: linear-gradient(135deg, #3730a3 0%, #6366f1 50%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 3s ease infinite;
            background-size: 200% 200%;
        }
        
        .dark-mode h1 {
            background: linear-gradient(135deg, #818cf8 0%, #a78bfa 50%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .status-indicator {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite, glow 2s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
            50% { box-shadow: 0 0 20px rgba(16, 185, 129, 0.8), 0 0 30px rgba(16, 185, 129, 0.3); }
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            margin: 40px 0;
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) backwards;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .stat-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 50px rgba(102, 126, 234, 0.5);
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.95;
            margin-bottom: 12px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }
        
        .stat-value {
            font-size: 42px;
            font-weight: 900;
            position: relative;
            z-index: 1;
            animation: countUp 1.5s ease-out;
        }
        
        @keyframes countUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .chart-container {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 32px;
            margin: 30px 0;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        
        .dark-mode .chart-container {
            background: var(--dark-bg-secondary);
            border-color: var(--dark-border);
        }
        
        .chart-container h2 {
            color: var(--text-primary);
            margin-bottom: 20px;
            font-weight: 700;
        }
        
        .dark-mode .chart-container h2 {
            color: var(--dark-text-primary);
        }
        
        .proxy-list {
            max-height: 450px;
            overflow-y: auto;
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border);
        }
        
        .dark-mode .proxy-list {
            background: var(--dark-bg-secondary);
            border-color: var(--dark-border);
        }
        
        .proxy-list::-webkit-scrollbar {
            width: 8px;
        }
        
        .proxy-list::-webkit-scrollbar-track {
            background: var(--border);
            border-radius: 10px;
        }
        
        .dark-mode .proxy-list::-webkit-scrollbar-track {
            background: var(--dark-bg-tertiary);
        }
        
        .proxy-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }
        
        .proxy-item {
            background: var(--bg-primary);
            padding: 20px;
            margin: 12px 0;
            border-radius: 16px;
            border-left: 5px solid var(--success);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px var(--shadow);
        }
        
        .dark-mode .proxy-item {
            background: var(--dark-bg-tertiary);
        }
        
        .proxy-item:hover {
            transform: translateX(8px) scale(1.02);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.2);
            border-left-width: 7px;
        }
        
        .quality-bar {
            width: 120px;
            height: 10px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }
        
        .dark-mode .quality-bar {
            background: var(--dark-bg-primary);
        }
        
        .quality-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), #34d399);
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .quality-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }
        
        .btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            margin: 8px 8px 8px 0;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }
        
        .btn:hover::before {
            transform: translateX(100%);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.5);
        }
        
        .btn:active {
            transform: translateY(-1px);
        }
        
        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            animation: slideDown 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .connected { 
            background: linear-gradient(135deg, var(--success), #059669);
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        
        .disconnected { 
            background: linear-gradient(135deg, var(--danger), #dc2626);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }
        .log-panel {
            background: #0f172a;
            color: #cbd5e1;
            padding: 24px;
            border-radius: 20px;
            font-family: 'Fira Code', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            height: 350px;
            overflow-y: auto;
            margin-top: 30px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
            border: 1px solid #1e293b;
            line-height: 1.8;
        }
        
        .dark-mode .log-panel {
            border-color: var(--dark-border);
        }
        
        .log-panel::-webkit-scrollbar {
            width: 8px;
        }
        
        .log-panel::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 4px;
        }
        
        .log-panel::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }
        
        .log-entry {
            padding: 8px 0;
            border-bottom: 1px solid #1e293b;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .success { color: var(--success); font-weight: 600; }
        .error { color: var(--danger); font-weight: 600; }
        .warning { color: var(--warning); font-weight: 600; }
        .info { color: var(--info); font-weight: 600; }
        
        @media (max-width: 768px) {
            .container {
                padding: 24px;
            }
            
            h1 {
                font-size: 28px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .stat-card {
                padding: 24px;
            }
            
            .theme-toggle {
                top: 20px;
                right: 20px;
                padding: 6px;
            }
            
            .theme-toggle-option {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<!-- Dark Mode Toggle -->
<div class="theme-toggle" onclick="toggleTheme()">
    <div class="theme-toggle-option" id="light-mode-btn">
        ☀️ Light
    </div>
    <div class="theme-toggle-option active" id="dark-mode-btn">
        🌙 Dark
    </div>
</div>

<div class="container">
        <h1>
            <span class="status-indicator" id="statusDot"></span>
            Real-Time Proxy Dashboard
            <span class="connection-status disconnected" id="wsStatus">Connecting...</span>
        </h1>
        <p style="text-align: center; color: #666; font-size: 13px; margin-top: -5px; margin-bottom: 15px;">
            Owner: <strong>@LEGEND_BL</strong>
        </p>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Proxies</div>
                <div class="stat-value" id="totalProxies">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Proxies</div>
                <div class="stat-value" id="activeProxies">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Quality</div>
                <div class="stat-value" id="avgQuality">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Success Rate</div>
                <div class="stat-value" id="successRate">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Response</div>
                <div class="stat-value" id="avgResponse">0s</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Requests</div>
                <div class="stat-value" id="totalRequests">0</div>
            </div>
        </div>
        
        <div class="chart-container">
            <h2 style="margin-bottom: 15px; color: #333;">Top Performing Proxies</h2>
            <div class="proxy-list" id="proxyList">
                <p style="text-align: center; color: #999;">Loading...</p>
            </div>
        </div>
        
        <div style="margin: 20px 0;">
            <button class="btn" onclick="fetchProxies()">🔄 Fetch New Proxies</button>
            <button class="btn" onclick="runHealthCheck()">🩺 Run Health Check</button>
            <button class="btn" onclick="clearLogs()">🗑️ Clear Logs</button>
        </div>
        
        <div class="log-panel" id="logPanel">
            <div class="log-entry info">[System] Dashboard loaded</div>
        </div>
    </div>
    
    <script>
        let ws = null;
        let reconnectTimer = null;
        
        // Connect to WebSocket
        function connectWebSocket() {
            const wsUrl = 'ws://localhost:8080';
            log('Connecting to WebSocket server...', 'info');
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    log('✓ WebSocket connected', 'success');
                    updateConnectionStatus(true);
                    
                    // Request initial data
                    ws.send(JSON.stringify({ type: 'get_analytics' }));
                    ws.send(JSON.stringify({ type: 'get_proxies' }));
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        handleWebSocketMessage(data);
                    } catch (e) {
                        console.error('Parse error:', e);
                    }
                };
                
                ws.onerror = (error) => {
                    log('✗ WebSocket error', 'error');
                    console.error(error);
                };
                
                ws.onclose = () => {
                    log('WebSocket disconnected', 'warning');
                    updateConnectionStatus(false);
                    
                    // Reconnect after 5 seconds
                    if (!reconnectTimer) {
                        reconnectTimer = setTimeout(() => {
                            reconnectTimer = null;
                            connectWebSocket();
                        }, 5000);
                    }
                };
            } catch (e) {
                log('✗ Failed to connect to WebSocket', 'error');
                updateConnectionStatus(false);
            }
        }
        
        // Handle WebSocket messages
        function handleWebSocketMessage(data) {
            if (data.type === 'analytics' || data.type === 'update') {
                updateAnalytics(data.data || data.analytics);
            } else if (data.type === 'proxies') {
                updateProxyList(data.data);
            } else if (data.type === 'health') {
                log('Health check: ' + data.data.status, data.data.status === 'healthy' ? 'success' : 'warning');
            }
        }
        
        // Update analytics display
        function updateAnalytics(analytics) {
            if (!analytics) return;
            
            document.getElementById('totalProxies').textContent = analytics.total_proxies || 0;
            document.getElementById('activeProxies').textContent = analytics.active_proxies || 0;
            document.getElementById('avgQuality').textContent = Math.round((analytics.avg_quality_score || 0) * 100) + '%';
            document.getElementById('successRate').textContent = (analytics.success_rate || 0) + '%';
            document.getElementById('avgResponse').textContent = (analytics.avg_response_time || 0) + 's';
            document.getElementById('totalRequests').textContent = analytics.total_requests || 0;
            
            log('Analytics updated', 'info');
        }
        
        // Update proxy list display
        function updateProxyList(proxies) {
            if (!proxies || !proxies.length) return;
            
            const listEl = document.getElementById('proxyList');
            listEl.innerHTML = '';
            
            proxies.slice(0, 20).forEach(proxy => {
                const item = document.createElement('div');
                item.className = 'proxy-item';
                
                const quality = Math.round((proxy.quality_score || 0) * 100);
                const qualityColor = quality > 70 ? '#4caf50' : quality > 40 ? '#ff9800' : '#f44336';
                
                item.innerHTML = `
                    <div>
                        <strong>${proxy.proxy || 'Unknown'}</strong><br>
                        <small style="color: #666;">${proxy.country || 'Unknown'} | ${proxy.isp || 'Unknown'}</small>
                    </div>
                    <div style="text-align: right;">
                        <div class="quality-bar">
                            <div class="quality-fill" style="width: ${quality}%; background: ${qualityColor};"></div>
                        </div>
                        <small style="color: #666;">${quality}% | ${proxy.avg_response_time || 0}s</small>
                    </div>
                `;
                
                listEl.appendChild(item);
            });
            
            log(`Proxy list updated (${proxies.length} proxies)`, 'success');
        }
        
        // Update connection status
        function updateConnectionStatus(connected) {
            const statusEl = document.getElementById('wsStatus');
            const dotEl = document.getElementById('statusDot');
            
            if (connected) {
                statusEl.textContent = 'Connected';
                statusEl.className = 'connection-status connected';
                dotEl.style.background = '#4caf50';
            } else {
                statusEl.textContent = 'Disconnected';
                statusEl.className = 'connection-status disconnected';
                dotEl.style.background = '#f44336';
            }
        }
        
        // Log message
        function log(message, type = 'info') {
            const logPanel = document.getElementById('logPanel');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;
        }
        
        // Fetch new proxies
        async function fetchProxies() {
            log('Fetching new proxies...', 'info');
            try {
                const response = await fetch('/fetch_proxies.php?api=1&count=50');
                const data = await response.json();
                if (data.success) {
                    log(`✓ Fetched ${data.stats.working} working proxies`, 'success');
                } else {
                    log('✗ Failed to fetch proxies', 'error');
                }
            } catch (e) {
                log('✗ Error fetching proxies', 'error');
            }
        }
        
        // Run health check
        async function runHealthCheck() {
            log('Running health check...', 'info');
            try {
                const response = await fetch('/api.php/health');
                const data = await response.json();
                if (data.success) {
                    const status = data.health.status;
                    log(`✓ Health check: ${status}`, status === 'healthy' ? 'success' : 'warning');
                } else {
                    log('✗ Health check failed', 'error');
                }
            } catch (e) {
                log('✗ Error running health check', 'error');
            }
        }
        
        // Clear logs
        function clearLogs() {
            document.getElementById('logPanel').innerHTML = '';
            log('Logs cleared', 'info');
        }
        
        // Initialize on load
        window.addEventListener('load', () => {
            connectWebSocket();
            log('Dashboard initialized', 'success');
        });
        
        // ============================================
        // DARK MODE FUNCTIONALITY
        // ============================================
        function toggleTheme() {
            const body = document.body;
            const lightBtn = document.getElementById('light-mode-btn');
            const darkBtn = document.getElementById('dark-mode-btn');
            
            body.classList.toggle('dark-mode');
            
            // Update button states
            if (body.classList.contains('dark-mode')) {
                darkBtn.classList.add('active');
                lightBtn.classList.remove('active');
                localStorage.setItem('theme', 'dark');
            } else {
                lightBtn.classList.add('active');
                darkBtn.classList.remove('active');
                localStorage.setItem('theme', 'light');
            }
        }
        
        // Load saved theme preference
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            const lightBtn = document.getElementById('light-mode-btn');
            const darkBtn = document.getElementById('dark-mode-btn');
            
            if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
                document.body.classList.remove('dark-mode');
                if (lightBtn) lightBtn.classList.add('active');
                if (darkBtn) darkBtn.classList.remove('active');
            } else {
                document.body.classList.add('dark-mode');
                if (darkBtn) darkBtn.classList.add('active');
                if (lightBtn) lightBtn.classList.remove('active');
            }
        }
        
        // Load theme on page load
        loadTheme();
        
        // ============================================
        // ENHANCED ANIMATIONS
        // ============================================
        function animateValue(element, start, end, duration) {
            if (!element) return;
            
            const range = end - start;
            const increment = range / (duration / 16);
            let current = start;
            
            const timer = setInterval(() => {
                current += increment;
                if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
                    current = end;
                    clearInterval(timer);
                }
                element.textContent = Math.floor(current);
            }, 16);
        }
        
        // Animate stats when they update
        function animateStatUpdate(elementId, newValue) {
            const element = document.getElementById(elementId);
            if (!element) return;
            
            const currentValue = parseInt(element.textContent) || 0;
            if (currentValue !== newValue) {
                animateValue(element, currentValue, newValue, 800);
            }
        }
        
        // Override updateAnalytics to include animations
        const originalUpdateAnalytics = updateAnalytics;
        updateAnalytics = function(analytics) {
            if (!analytics) return;
            
            // Animate stat updates
            animateStatUpdate('totalProxies', analytics.total_proxies || 0);
            animateStatUpdate('activeProxies', analytics.active_proxies || 0);
            animateStatUpdate('totalRequests', analytics.total_requests || 0);
            
            // Update other stats normally
            document.getElementById('avgQuality').textContent = Math.round((analytics.avg_quality_score || 0) * 100) + '%';
            document.getElementById('successRate').textContent = (analytics.success_rate || 0) + '%';
            document.getElementById('avgResponse').textContent = (analytics.avg_response_time || 0) + 's';
            
            log('✨ Analytics updated with animations', 'info');
        };
        
        console.log('%c🚀 Real-Time Dashboard Enhanced', 'color: #10b981; font-weight: bold; font-size: 16px;');
        console.log('%c🎨 Dark Mode • ⚡ Animations • 🌐 Live Updates', 'color: #8b5cf6; font-size: 14px;');
        console.log('%c👑 Powered by @LEGEND_BL', 'color: #6366f1; font-size: 14px;');
    </script>
</body>

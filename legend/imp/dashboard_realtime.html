<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Proxy Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-label {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 36px;
            font-weight: bold;
        }
        .chart-container {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
        }
        .proxy-list {
            max-height: 400px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
        }
        .proxy-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border-left: 4px solid #4caf50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        .proxy-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .quality-bar {
            width: 100px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .quality-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            transition: width 0.3s;
        }
        .btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .connection-status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .connected { background: #4caf50; color: white; }
        .disconnected { background: #f44336; color: white; }
        .log-panel {
            background: #1e1e1e;
            color: #0f0;
            padding: 20px;
            border-radius: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        .warning { color: #ff9800; }
        .info { color: #2196f3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span class="status-indicator" id="statusDot"></span>
            Real-Time Proxy Dashboard
            <span class="connection-status disconnected" id="wsStatus">Connecting...</span>
        </h1>
        <p style="text-align: center; color: #666; font-size: 13px; margin-top: -5px; margin-bottom: 15px;">
            Owner: <strong>@LEGEND_BL</strong>
        </p>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Proxies</div>
                <div class="stat-value" id="totalProxies">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Proxies</div>
                <div class="stat-value" id="activeProxies">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Quality</div>
                <div class="stat-value" id="avgQuality">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Success Rate</div>
                <div class="stat-value" id="successRate">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Response</div>
                <div class="stat-value" id="avgResponse">0s</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Requests</div>
                <div class="stat-value" id="totalRequests">0</div>
            </div>
        </div>
        
        <div class="chart-container">
            <h2 style="margin-bottom: 15px; color: #333;">Top Performing Proxies</h2>
            <div class="proxy-list" id="proxyList">
                <p style="text-align: center; color: #999;">Loading...</p>
            </div>
        </div>
        
        <div style="margin: 20px 0;">
            <button class="btn" onclick="fetchProxies()">🔄 Fetch New Proxies</button>
            <button class="btn" onclick="runHealthCheck()">🩺 Run Health Check</button>
            <button class="btn" onclick="clearLogs()">🗑️ Clear Logs</button>
        </div>
        
        <div class="log-panel" id="logPanel">
            <div class="log-entry info">[System] Dashboard loaded</div>
        </div>
    </div>
    
    <script>
        let ws = null;
        let reconnectTimer = null;
        let reconnectAttempts = 0;
        let maxReconnectAttempts = 10;
        let useHttpFallback = false;
        let httpPollTimer = null;
        
        // Connect to WebSocket with better error handling
        function connectWebSocket() {
            // If WebSocket failed too many times, use HTTP polling
            if (reconnectAttempts >= maxReconnectAttempts) {
                log('WebSocket unavailable, switching to HTTP polling...', 'warning');
                useHttpFallback = true;
                startHttpPolling();
                return;
            }
            
            const wsUrl = 'ws://localhost:8080';
            log(`Connecting to WebSocket server... (attempt ${reconnectAttempts + 1})`, 'info');
            
            try {
                // Close existing connection if any
                if (ws && ws.readyState !== WebSocket.CLOSED) {
                    ws.close();
                }
                
                ws = new WebSocket(wsUrl);
                
                // Set connection timeout
                const connectionTimeout = setTimeout(() => {
                    if (ws.readyState !== WebSocket.OPEN) {
                        ws.close();
                        log('✗ WebSocket connection timeout', 'error');
                        scheduleReconnect();
                    }
                }, 5000);
                
                ws.onopen = () => {
                    clearTimeout(connectionTimeout);
                    reconnectAttempts = 0; // Reset on successful connection
                    log('✓ WebSocket connected', 'success');
                    updateConnectionStatus(true);
                    
                    // Request initial data
                    try {
                        ws.send(JSON.stringify({ type: 'get_analytics' }));
                        ws.send(JSON.stringify({ type: 'get_proxies' }));
                    } catch (e) {
                        log('✗ Failed to send initial requests', 'error');
                    }
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        handleWebSocketMessage(data);
                    } catch (e) {
                        log('✗ Failed to parse message: ' + e.message, 'error');
                        console.error('Parse error:', e);
                    }
                };
                
                ws.onerror = (error) => {
                    clearTimeout(connectionTimeout);
                    log('✗ WebSocket error', 'error');
                    console.error('WebSocket error:', error);
                };
                
                ws.onclose = (event) => {
                    clearTimeout(connectionTimeout);
                    log(`WebSocket disconnected (code: ${event.code})`, 'warning');
                    updateConnectionStatus(false);
                    scheduleReconnect();
                };
            } catch (e) {
                log('✗ Failed to create WebSocket: ' + e.message, 'error');
                console.error('WebSocket creation error:', e);
                updateConnectionStatus(false);
                scheduleReconnect();
            }
        }
        
        // Schedule reconnection with exponential backoff
        function scheduleReconnect() {
            if (reconnectTimer) return;
            
            reconnectAttempts++;
            const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 30000); // Max 30s
            
            log(`Reconnecting in ${Math.round(delay / 1000)}s...`, 'info');
            
            reconnectTimer = setTimeout(() => {
                reconnectTimer = null;
                if (!useHttpFallback) {
                    connectWebSocket();
                }
            }, delay);
        }
        
        // HTTP polling fallback
        function startHttpPolling() {
            if (httpPollTimer) return;
            
            log('HTTP polling mode activated', 'info');
            updateConnectionStatus(false);
            
            // Initial poll
            pollDashboardData();
            
            // Poll every 10 seconds
            httpPollTimer = setInterval(pollDashboardData, 10000);
        }
        
        // Poll dashboard data via HTTP
        function pollDashboardData() {
            Promise.all([
                fetch('/index.php?stats=1').then(r => r.ok ? r.json() : null),
                fetch('/api.php/analytics').then(r => r.ok ? r.json() : null)
            ])
            .then(([dashboardData, analyticsData]) => {
                if (analyticsData && analyticsData.success) {
                    handleWebSocketMessage({ type: 'analytics', data: analyticsData.analytics });
                }
                if (analyticsData && analyticsData.success && analyticsData.proxies) {
                    handleWebSocketMessage({ type: 'proxies', data: analyticsData.proxies });
                }
            })
            .catch(error => {
                log('✗ HTTP polling failed: ' + error.message, 'error');
                console.error('Polling error:', error);
            });
        }
        
        // Handle WebSocket messages
        function handleWebSocketMessage(data) {
            if (data.type === 'analytics' || data.type === 'update') {
                updateAnalytics(data.data || data.analytics);
            } else if (data.type === 'proxies') {
                updateProxyList(data.data);
            } else if (data.type === 'health') {
                log('Health check: ' + data.data.status, data.data.status === 'healthy' ? 'success' : 'warning');
            }
        }
        
        // Update analytics display with better error handling
        function updateAnalytics(analytics) {
            if (!analytics) {
                log('No analytics data received', 'warning');
                return;
            }
            
            try {
                const safeSet = (id, value, suffix = '') => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.textContent = (value !== null && value !== undefined ? value : 0) + suffix;
                    }
                };
                
                safeSet('totalProxies', analytics.total_proxies || 0);
                safeSet('activeProxies', analytics.active_proxies || 0);
                safeSet('avgQuality', Math.round((analytics.avg_quality_score || 0) * 100), '%');
                safeSet('successRate', analytics.success_rate || 0, '%');
                safeSet('avgResponse', (analytics.avg_response_time || 0).toFixed(2), 's');
                safeSet('totalRequests', analytics.total_requests || 0);
                
                log('Analytics updated successfully', 'info');
            } catch (e) {
                log('✗ Failed to update analytics: ' + e.message, 'error');
                console.error('Analytics update error:', e);
            }
        }
        
        // Update proxy list display with better error handling
        function updateProxyList(proxies) {
            if (!proxies) {
                log('No proxy data received', 'warning');
                return;
            }
            
            if (!Array.isArray(proxies)) {
                log('✗ Invalid proxy data format', 'error');
                return;
            }
            
            const listEl = document.getElementById('proxyList');
            if (!listEl) {
                log('✗ Proxy list element not found', 'error');
                return;
            }
            
            try {
                if (proxies.length === 0) {
                    listEl.innerHTML = '<p style="text-align: center; color: #999;">No proxies available</p>';
                    log('No proxies to display', 'info');
                    return;
                }
                
                listEl.innerHTML = '';
                
                proxies.slice(0, 20).forEach((proxy, index) => {
                    try {
                        const item = document.createElement('div');
                        item.className = 'proxy-item';
                        
                        const quality = Math.round((proxy.quality_score || 0) * 100);
                        const qualityColor = quality > 70 ? '#4caf50' : quality > 40 ? '#ff9800' : '#f44336';
                        
                        // Sanitize data
                        const proxyAddr = escapeHtml(proxy.proxy || 'Unknown');
                        const country = escapeHtml(proxy.country || 'Unknown');
                        const isp = escapeHtml(proxy.isp || 'Unknown');
                        const responseTime = (proxy.avg_response_time || 0).toFixed(2);
                        
                        item.innerHTML = `
                            <div>
                                <strong>${proxyAddr}</strong><br>
                                <small style="color: #666;">${country} | ${isp}</small>
                            </div>
                            <div style="text-align: right;">
                                <div class="quality-bar">
                                    <div class="quality-fill" style="width: ${quality}%; background: ${qualityColor};"></div>
                                </div>
                                <small style="color: #666;">${quality}% | ${responseTime}s</small>
                            </div>
                        `;
                        
                        listEl.appendChild(item);
                    } catch (e) {
                        console.error(`Error rendering proxy ${index}:`, e);
                    }
                });
                
                log(`Proxy list updated (${proxies.length} proxies)`, 'success');
            } catch (e) {
                log('✗ Failed to update proxy list: ' + e.message, 'error');
                console.error('Proxy list update error:', e);
                listEl.innerHTML = '<p style="text-align: center; color: #f44336;">Error loading proxies</p>';
            }
        }
        
        // Helper: Escape HTML
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }
        
        // Update connection status
        function updateConnectionStatus(connected) {
            const statusEl = document.getElementById('wsStatus');
            const dotEl = document.getElementById('statusDot');
            
            if (connected) {
                statusEl.textContent = 'Connected';
                statusEl.className = 'connection-status connected';
                dotEl.style.background = '#4caf50';
            } else {
                statusEl.textContent = 'Disconnected';
                statusEl.className = 'connection-status disconnected';
                dotEl.style.background = '#f44336';
            }
        }
        
        // Log message
        function log(message, type = 'info') {
            const logPanel = document.getElementById('logPanel');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;
        }
        
        // Fetch new proxies with better error handling
        async function fetchProxies() {
            log('Fetching new proxies...', 'info');
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 30000); // 30s timeout
                
                const response = await fetch('/fetch_proxies.php?api=1&count=50', {
                    signal: controller.signal,
                    headers: { 'Accept': 'application/json' }
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data && data.success) {
                    const working = data.stats?.working || 0;
                    log(`✓ Fetched ${working} working proxies`, 'success');
                    
                    // Refresh display after fetching
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(JSON.stringify({ type: 'get_proxies' }));
                    } else if (useHttpFallback) {
                        pollDashboardData();
                    }
                } else {
                    log('✗ Failed to fetch proxies: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    log('✗ Fetch timeout - request took too long', 'error');
                } else {
                    log('✗ Error fetching proxies: ' + e.message, 'error');
                }
                console.error('Fetch proxies error:', e);
            }
        }
        
        // Run health check with better error handling
        async function runHealthCheck() {
            log('Running health check...', 'info');
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000); // 10s timeout
                
                const response = await fetch('/health.php', {
                    signal: controller.signal,
                    headers: { 'Accept': 'application/json' }
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data && data.success !== false) {
                    const status = data.status || data.health?.status || 'unknown';
                    log(`✓ Health check: ${status}`, status === 'healthy' ? 'success' : 'warning');
                } else {
                    log('✗ Health check failed: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    log('✗ Health check timeout', 'error');
                } else {
                    log('✗ Error running health check: ' + e.message, 'error');
                }
                console.error('Health check error:', e);
            }
        }
        
        // Clear logs
        function clearLogs() {
            document.getElementById('logPanel').innerHTML = '';
            log('Logs cleared', 'info');
        }
        
        // Initialize on load with error handling
        window.addEventListener('load', () => {
            try {
                log('Dashboard initializing...', 'info');
                
                // Check for WebSocket support
                if (!window.WebSocket) {
                    log('✗ WebSocket not supported, using HTTP fallback', 'warning');
                    useHttpFallback = true;
                    startHttpPolling();
                } else {
                    connectWebSocket();
                }
                
                log('Dashboard initialized successfully', 'success');
            } catch (e) {
                log('✗ Dashboard initialization failed: ' + e.message, 'error');
                console.error('Initialization error:', e);
            }
        });
        
        // Handle page visibility for performance
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                console.log('Dashboard hidden, reducing activity');
            } else {
                console.log('Dashboard visible, resuming activity');
                // Refresh data when tab becomes visible
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'get_analytics' }));
                    ws.send(JSON.stringify({ type: 'get_proxies' }));
                } else if (useHttpFallback) {
                    pollDashboardData();
                }
            }
        });
        
        // Handle errors globally
        window.addEventListener('error', (e) => {
            console.error('Unhandled error:', e.error);
        });
        
        window.addEventListener('unhandledrejection', (e) => {
            console.error('Unhandled promise rejection:', e.reason);
        });
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (ws) {
                ws.close();
            }
            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
            }
            if (httpPollTimer) {
                clearInterval(httpPollTimer);
            }
        });
    </script>
</body>
</html>

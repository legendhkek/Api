<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Proxy Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            transition: transform 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .stat-label {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 36px;
            font-weight: bold;
        }
        .chart-container {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
        }
        .proxy-list {
            max-height: 400px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
        }
        .proxy-item {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border-left: 4px solid #4caf50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        .proxy-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .quality-bar {
            width: 100px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .quality-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            transition: width 0.3s;
        }
        .btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            position: relative;
            min-width: 150px;
        }
        .btn:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            margin: auto;
            border: 2px solid transparent;
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }
        @keyframes spin {
            0% { transform: translateY(-50%) rotate(0deg); }
            100% { transform: translateY(-50%) rotate(360deg); }
        }
        .connection-status {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .connected { background: #4caf50; color: white; }
        .disconnected { background: #f44336; color: white; }
        .connecting { background: #ff9800; color: white; }
        .log-panel {
            background: #1e1e1e;
            color: #0f0;
            padding: 20px;
            border-radius: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #333;
            word-wrap: break-word;
        }
        .success { color: #4caf50; }
        .error { color: #f44336; }
        .warning { color: #ff9800; }
        .info { color: #2196f3; }
        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin: 15px 0;
            display: none;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .alert.show {
            display: block;
        }
        .alert-error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
        }
        .alert-success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
        }
        .alert-warning {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            color: #e65100;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }
            .btn {
                width: 100%;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span class="status-indicator" id="statusDot" aria-label="Connection status indicator"></span>
            Real-Time Proxy Dashboard
            <span class="connection-status disconnected" id="wsStatus" role="status" aria-live="polite">Connecting...</span>
        </h1>
        <p style="text-align: center; color: #666; font-size: 13px; margin-top: -5px; margin-bottom: 15px;">
            Owner: <strong>@LEGEND_BL</strong>
        </p>
        
        <div id="alertContainer"></div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Proxies</div>
                <div class="stat-value" id="totalProxies" aria-live="polite">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Proxies</div>
                <div class="stat-value" id="activeProxies" aria-live="polite">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Quality</div>
                <div class="stat-value" id="avgQuality" aria-live="polite">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Success Rate</div>
                <div class="stat-value" id="successRate" aria-live="polite">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Response</div>
                <div class="stat-value" id="avgResponse" aria-live="polite">0s</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Requests</div>
                <div class="stat-value" id="totalRequests" aria-live="polite">0</div>
            </div>
        </div>
        
        <div class="chart-container">
            <h2 style="margin-bottom: 15px; color: #333;">Top Performing Proxies</h2>
            <div class="proxy-list" id="proxyList" role="list" aria-label="List of top performing proxies">
                <div class="empty-state">
                    <div class="empty-state-icon">⏳</div>
                    <p>Loading proxy data...</p>
                </div>
            </div>
        </div>
        
        <div style="margin: 20px 0; display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn" id="fetchBtn" onclick="fetchProxies()" aria-label="Fetch new proxies from sources">
                🔄 Fetch New Proxies
            </button>
            <button class="btn" id="healthBtn" onclick="runHealthCheck()" aria-label="Run system health check">
                🩺 Run Health Check
            </button>
            <button class="btn" onclick="clearLogs()" aria-label="Clear log panel">
                🗑️ Clear Logs
            </button>
        </div>
        
        <div class="log-panel" id="logPanel" role="log" aria-label="System log messages" aria-live="polite">
            <div class="log-entry info">[System] Dashboard loaded</div>
        </div>
    </div>
    
    <script>
        let ws = null;
        let reconnectTimer = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 10;
        let isFetching = false;
        let isHealthChecking = false;
        
        // Show alert message
        function showAlert(message, type = 'info') {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} show`;
            alert.setAttribute('role', 'alert');
            alert.textContent = message;
            container.appendChild(alert);
            
            setTimeout(() => {
                alert.classList.remove('show');
                setTimeout(() => alert.remove(), 300);
            }, 5000);
        }
        
        // Sanitize HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Connect to WebSocket with improved error handling
        function connectWebSocket() {
            // Prevent multiple connection attempts
            if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) {
                return;
            }
            
            const wsUrl = 'ws://localhost:8080';
            log('Connecting to WebSocket server...', 'info');
            updateConnectionStatus('connecting');
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    log('✓ WebSocket connected successfully', 'success');
                    updateConnectionStatus('connected');
                    reconnectAttempts = 0;
                    
                    // Request initial data with error handling
                    try {
                        ws.send(JSON.stringify({ type: 'get_analytics' }));
                        ws.send(JSON.stringify({ type: 'get_proxies' }));
                    } catch (e) {
                        log('✗ Error sending initial requests: ' + e.message, 'error');
                        showAlert('Failed to request initial data', 'error');
                    }
                };
                
                ws.onmessage = (event) => {
                    try {
                        if (!event.data) {
                            log('✗ Received empty message', 'warning');
                            return;
                        }
                        
                        const data = JSON.parse(event.data);
                        handleWebSocketMessage(data);
                    } catch (e) {
                        log('✗ Parse error: ' + e.message, 'error');
                        console.error('WebSocket parse error:', e, 'Data:', event.data);
                    }
                };
                
                ws.onerror = (error) => {
                    log('✗ WebSocket connection error', 'error');
                    console.error('WebSocket error:', error);
                    updateConnectionStatus('disconnected');
                    showAlert('WebSocket connection error. Attempting to reconnect...', 'error');
                };
                
                ws.onclose = (event) => {
                    const wasConnected = reconnectAttempts === 0;
                    log(`WebSocket disconnected (code: ${event.code}, reason: ${event.reason || 'none'})`, 'warning');
                    updateConnectionStatus('disconnected');
                    
                    // Only attempt reconnect if it wasn't a clean close
                    if (event.code !== 1000 && reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                        reconnectAttempts++;
                        const delay = Math.min(5000 * reconnectAttempts, 30000); // Exponential backoff, max 30s
                        
                        if (!reconnectTimer) {
                            log(`Reconnecting in ${delay/1000}s... (attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})`, 'info');
                            reconnectTimer = setTimeout(() => {
                                reconnectTimer = null;
                                connectWebSocket();
                            }, delay);
                        }
                    } else if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
                        showAlert('Maximum reconnection attempts reached. Please refresh the page.', 'error');
                        log('✗ Maximum reconnection attempts reached', 'error');
                    }
                };
            } catch (e) {
                log('✗ Failed to create WebSocket: ' + e.message, 'error');
                updateConnectionStatus('disconnected');
                showAlert('Failed to connect to WebSocket server: ' + e.message, 'error');
                console.error('WebSocket creation error:', e);
            }
        }
        
        // Handle WebSocket messages with validation
        function handleWebSocketMessage(data) {
            if (!data || typeof data !== 'object') {
                log('✗ Invalid message format received', 'error');
                return;
            }
            
            try {
                if (data.type === 'analytics' || data.type === 'update') {
                    const analytics = data.data || data.analytics;
                    if (analytics && typeof analytics === 'object') {
                        updateAnalytics(analytics);
                    } else {
                        log('✗ Invalid analytics data format', 'warning');
                    }
                } else if (data.type === 'proxies') {
                    const proxies = data.data;
                    if (Array.isArray(proxies)) {
                        updateProxyList(proxies);
                    } else {
                        log('✗ Invalid proxies data format', 'warning');
                    }
                } else if (data.type === 'health') {
                    if (data.data && data.data.status) {
                        const status = data.data.status;
                        log('Health check: ' + status, status === 'healthy' ? 'success' : 'warning');
                    }
                } else {
                    log('Unknown message type: ' + (data.type || 'none'), 'info');
                }
            } catch (e) {
                log('✗ Error handling message: ' + e.message, 'error');
                console.error('Message handling error:', e, 'Data:', data);
            }
        }
        
        // Update analytics display with validation
        function updateAnalytics(analytics) {
            if (!analytics || typeof analytics !== 'object') {
                log('✗ Cannot update analytics: invalid data', 'error');
                return;
            }
            
            try {
                const safeUpdate = (id, value, fallback = '0') => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.textContent = value !== null && value !== undefined ? String(value) : fallback;
                    }
                };
                
                safeUpdate('totalProxies', analytics.total_proxies);
                safeUpdate('activeProxies', analytics.active_proxies);
                
                const avgQuality = analytics.avg_quality_score;
                const qualityPercent = avgQuality !== null && avgQuality !== undefined 
                    ? Math.round(Number(avgQuality) * 100) 
                    : 0;
                safeUpdate('avgQuality', qualityPercent + '%');
                
                const successRate = analytics.success_rate;
                safeUpdate('successRate', successRate !== null && successRate !== undefined ? Number(successRate).toFixed(1) : 0, '0%');
                
                const avgResponse = analytics.avg_response_time;
                safeUpdate('avgResponse', avgResponse !== null && avgResponse !== undefined ? Number(avgResponse).toFixed(2) : 0, '0s');
                
                safeUpdate('totalRequests', analytics.total_requests);
                
                log('Analytics updated successfully', 'info');
            } catch (e) {
                log('✗ Error updating analytics: ' + e.message, 'error');
                console.error('Analytics update error:', e);
            }
        }
        
        // Update proxy list display with XSS protection
        function updateProxyList(proxies) {
            if (!Array.isArray(proxies)) {
                log('✗ Cannot update proxy list: invalid data format', 'error');
                return;
            }
            
            const listEl = document.getElementById('proxyList');
            if (!listEl) {
                log('✗ Proxy list element not found', 'error');
                return;
            }
            
            try {
                if (proxies.length === 0) {
                    listEl.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>No proxies available</p>
                        </div>
                    `;
                    log('Proxy list is empty', 'warning');
                    return;
                }
                
                listEl.innerHTML = '';
                
                proxies.slice(0, 20).forEach((proxy, index) => {
                    if (!proxy || typeof proxy !== 'object') {
                        return;
                    }
                    
                    const item = document.createElement('div');
                    item.className = 'proxy-item';
                    item.setAttribute('role', 'listitem');
                    
                    const proxyStr = escapeHtml(proxy.proxy || 'Unknown');
                    const country = escapeHtml(proxy.country || 'Unknown');
                    const isp = escapeHtml(proxy.isp || 'Unknown');
                    
                    const quality = Math.max(0, Math.min(100, Math.round((proxy.quality_score || 0) * 100)));
                    const qualityColor = quality > 70 ? '#4caf50' : quality > 40 ? '#ff9800' : '#f44336';
                    const responseTime = proxy.avg_response_time !== null && proxy.avg_response_time !== undefined 
                        ? Number(proxy.avg_response_time).toFixed(2) 
                        : '0.00';
                    
                    item.innerHTML = `
                        <div>
                            <strong>${proxyStr}</strong><br>
                            <small style="color: #666;">${country} | ${isp}</small>
                        </div>
                        <div style="text-align: right;">
                            <div class="quality-bar" role="progressbar" aria-valuenow="${quality}" aria-valuemin="0" aria-valuemax="100">
                                <div class="quality-fill" style="width: ${quality}%; background: ${qualityColor};"></div>
                            </div>
                            <small style="color: #666;">${quality}% | ${responseTime}s</small>
                        </div>
                    `;
                    
                    listEl.appendChild(item);
                });
                
                log(`Proxy list updated (${proxies.length} proxies, showing top 20)`, 'success');
            } catch (e) {
                log('✗ Error updating proxy list: ' + e.message, 'error');
                console.error('Proxy list update error:', e);
                listEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <p>Error loading proxy list</p>
                    </div>
                `;
            }
        }
        
        // Update connection status
        function updateConnectionStatus(status) {
            const statusEl = document.getElementById('wsStatus');
            const dotEl = document.getElementById('statusDot');
            
            if (!statusEl || !dotEl) return;
            
            statusEl.classList.remove('connected', 'disconnected', 'connecting');
            
            switch(status) {
                case 'connected':
                    statusEl.textContent = 'Connected';
                    statusEl.className = 'connection-status connected';
                    dotEl.style.background = '#4caf50';
                    break;
                case 'connecting':
                    statusEl.textContent = 'Connecting...';
                    statusEl.className = 'connection-status connecting';
                    dotEl.style.background = '#ff9800';
                    break;
                case 'disconnected':
                default:
                    statusEl.textContent = 'Disconnected';
                    statusEl.className = 'connection-status disconnected';
                    dotEl.style.background = '#f44336';
                    break;
            }
        }
        
        // Log message with validation
        function log(message, type = 'info') {
            if (!message || typeof message !== 'string') {
                console.warn('Invalid log message:', message);
                return;
            }
            
            const logPanel = document.getElementById('logPanel');
            if (!logPanel) {
                console.warn('Log panel not found');
                return;
            }
            
            try {
                const entry = document.createElement('div');
                entry.className = 'log-entry ' + (['success', 'error', 'warning', 'info'].includes(type) ? type : 'info');
                entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
                logPanel.appendChild(entry);
                
                // Limit log entries to prevent memory issues
                const maxEntries = 500;
                while (logPanel.children.length > maxEntries) {
                    logPanel.removeChild(logPanel.firstChild);
                }
                
                logPanel.scrollTop = logPanel.scrollHeight;
            } catch (e) {
                console.error('Error logging message:', e);
            }
        }
        
        // Fetch new proxies with improved error handling
        async function fetchProxies() {
            if (isFetching) {
                showAlert('Proxy fetch already in progress', 'warning');
                return;
            }
            
            const btn = document.getElementById('fetchBtn');
            const originalText = btn.textContent;
            
            try {
                isFetching = true;
                btn.disabled = true;
                btn.classList.add('loading');
                btn.textContent = 'Fetching...';
                
                log('Fetching new proxies...', 'info');
                
                const response = await fetch('/fetch_proxies.php?api=1&count=50', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data && data.success) {
                    const working = data.stats?.working || 0;
                    log(`✓ Successfully fetched ${working} working proxies`, 'success');
                    showAlert(`Successfully fetched ${working} working proxies`, 'success');
                } else {
                    const errorMsg = data?.error || data?.message || 'Unknown error';
                    log('✗ Failed to fetch proxies: ' + errorMsg, 'error');
                    showAlert('Failed to fetch proxies: ' + errorMsg, 'error');
                }
            } catch (e) {
                const errorMsg = e.message || 'Network error';
                log('✗ Error fetching proxies: ' + errorMsg, 'error');
                showAlert('Error fetching proxies: ' + errorMsg, 'error');
                console.error('Fetch proxies error:', e);
            } finally {
                isFetching = false;
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.textContent = originalText;
            }
        }
        
        // Run health check with improved error handling
        async function runHealthCheck() {
            if (isHealthChecking) {
                showAlert('Health check already in progress', 'warning');
                return;
            }
            
            const btn = document.getElementById('healthBtn');
            const originalText = btn.textContent;
            
            try {
                isHealthChecking = true;
                btn.disabled = true;
                btn.classList.add('loading');
                btn.textContent = 'Checking...';
                
                log('Running health check...', 'info');
                
                const response = await fetch('/api.php/health', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data && data.success) {
                    const status = data.health?.status || 'unknown';
                    const isHealthy = status === 'healthy';
                    log(`✓ Health check completed: ${status}`, isHealthy ? 'success' : 'warning');
                    showAlert(`Health check: ${status}`, isHealthy ? 'success' : 'warning');
                } else {
                    const errorMsg = data?.error || data?.message || 'Unknown error';
                    log('✗ Health check failed: ' + errorMsg, 'error');
                    showAlert('Health check failed: ' + errorMsg, 'error');
                }
            } catch (e) {
                const errorMsg = e.message || 'Network error';
                log('✗ Error running health check: ' + errorMsg, 'error');
                showAlert('Error running health check: ' + errorMsg, 'error');
                console.error('Health check error:', e);
            } finally {
                isHealthChecking = false;
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.textContent = originalText;
            }
        }
        
        // Clear logs
        function clearLogs() {
            const logPanel = document.getElementById('logPanel');
            if (logPanel) {
                logPanel.innerHTML = '';
                log('Logs cleared', 'info');
            }
        }
        
        // Initialize on load
        window.addEventListener('load', () => {
            try {
                connectWebSocket();
                log('Dashboard initialized successfully', 'success');
            } catch (e) {
                log('✗ Dashboard initialization error: ' + e.message, 'error');
                showAlert('Dashboard initialization error: ' + e.message, 'error');
                console.error('Initialization error:', e);
            }
        });
        
        // Handle page visibility changes
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && (!ws || ws.readyState === WebSocket.CLOSED)) {
                log('Page visible, reconnecting...', 'info');
                connectWebSocket();
            }
        });
        
        // Handle errors globally
        window.addEventListener('error', (event) => {
            log('✗ Unhandled error: ' + (event.message || 'Unknown'), 'error');
            console.error('Global error:', event);
        });
        
        window.addEventListener('unhandledrejection', (event) => {
            log('✗ Unhandled promise rejection: ' + (event.reason?.message || event.reason || 'Unknown'), 'error');
            console.error('Unhandled rejection:', event);
        });
    </script>
</body>
